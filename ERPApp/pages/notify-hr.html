<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Approval Needed</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f8; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 30px auto; background: #fff; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); padding: 30px; }
        h2, h3, h4 { color: #333; margin: 0 0 15px 0; }
        p { margin: 5px 0; font-size: 16px; }
        .buttons { margin-top: 25px; }
        a { text-decoration: none; padding: 12px 25px; margin-right: 10px; border-radius: 6px; color: #fff; font-weight: bold; }
        .approve { background-color: #17a2b8; }
        .reject { background-color: #dc3545; }
        .footer { margin-top: 30px; font-size: 14px; color: #777; }
    </style>
</head>
<body>
    <div class="container">
        <h2>HR Approval Needed</h2>
        <h3>Purchase Request Details</h3>
        <p><strong>Requestor:</strong> {{Requestor}}</p>
        <p><strong>Item:</strong> {{Item}}</p>
        <p><strong>Price:</strong> {{Price}}</p>
        <p><strong>Description:</strong> {{Description}}</p>
        <div class="buttons">
            <a class="approve" href="{{ApproveUrl}}">Approve</a>
            <a class="reject" href="{{RejectUrl}}">Reject</a>
        </div>
        <div class="footer">Please click one of the above buttons to approve or reject this request.</div>
    </div>
</body>
</html>
